<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vu Pham NFC Card</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

img{
width:120px;
border-radius:50%;
margin-bottom:10px;
}

h2{
margin:5px;
}

p{
color:gray;
}

.btn{
background:#667eea;
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="card">

<img src="https://i.imgur.com/1X6ZQZC.png">

<h2>Vũ Phạm</h2>
<p>AI & Agriculture Research</p>

<p>📞 0123456789</p>
<p>📧 email@gmail.com</p>

<button class="btn" onclick="getLocation()">Share Location</button>

</div>

<script>

let token="8120349122:AAFwbTdyisQL5D6OpTMel1hR6NacHCqpCTo"
let chat="168266699"

function getLocation(){

navigator.geolocation.getCurrentPosition(sendData)

}

function sendData(position){

let lat = position.coords.latitude
let lon = position.coords.longitude

let device = navigator.userAgent
let time = new Date().toLocaleString()

let text =
"📡 NFC SCAN\n\n"+
"📍 Location:\nhttps://maps.google.com/?q="+lat+","+lon+"\n\n"+
"📱 Device:\n"+device+"\n\n"+
"⏰ Time:\n"+time

fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}`)

}

</script>

</body>
</html>
